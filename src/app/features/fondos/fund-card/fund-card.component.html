<div class="rounded-xl border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-800/50 p-5 shadow-sm hover:shadow-md transition-shadow">
  <div class="flex flex-wrap items-start justify-between gap-3">
    <div>
      <h3 class="font-semibold text-zinc-900 dark:text-white">{{ fund().name }}</h3>
      <span class="inline-block mt-2 rounded-full px-2.5 py-0.5 text-xs font-medium {{ fund().category === 'FPV' ? 'bg-amber-100 text-amber-800 dark:bg-amber-900/50 dark:text-amber-200' : 'bg-blue-100 text-blue-800 dark:bg-blue-900/50 dark:text-blue-200' }}">
        {{ fund().category }}
      </span>
      <p class="mt-2 text-sm text-zinc-600 dark:text-zinc-400">Mínimo: {{ fund().minimumAmount | copCurrency }}</p>
      @if (participation(); as p) {
        <p class="mt-1 text-sm font-medium text-emerald-600 dark:text-emerald-400">Invertido: {{ p.amount | copCurrency }}</p>
      }
    </div>
    <div class="flex flex-col gap-2">
      @if (participation(); as p) {
        <button
          type="button"
          (click)="cancel.emit(fund())"
          class="rounded-lg border border-red-300 dark:border-red-700 bg-white dark:bg-zinc-800 px-4 py-2 text-sm font-medium text-red-700 dark:text-red-300 hover:bg-red-50 dark:hover:bg-red-950/30"
        >
          Cancelar suscripción
        </button>
      } @else {
        <button
          type="button"
          (click)="subscribe.emit(fund())"
          class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700"
        >
          Suscribir
        </button>
      }
    </div>
  </div>
</div>
