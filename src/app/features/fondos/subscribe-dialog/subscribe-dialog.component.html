<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50" (click)="close.emit()" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
  <div class="bg-white dark:bg-zinc-900 rounded-2xl shadow-xl max-w-md w-full p-6" (click)="$event.stopPropagation()">
    <h2 id="dialog-title" class="text-xl font-semibold text-zinc-900 dark:text-white">Suscribirse a {{ fund()?.name }}</h2>
    <p class="text-sm text-zinc-600 dark:text-zinc-400 mt-1">Monto mínimo: {{ (fund()?.minimumAmount ?? 0) | copCurrency }}</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-6 space-y-4">
      <div>
        <label for="amount" class="block text-sm font-medium text-zinc-700 dark:text-zinc-300">Monto a suscribir (COP)</label>
        <input
          id="amount"
          type="text"
          formControlName="amount"
          appCurrencyInput
          inputmode="decimal"
          placeholder="0"
          class="mt-1 block w-full rounded-lg border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-800 px-3 py-2 text-zinc-900 dark:text-white shadow-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500"
        />
        @if (form.get('amount')?.invalid && form.get('amount')?.touched) {
          <p class="mt-1 text-sm text-red-600">{{ getAmountError() }}</p>
        }
      </div>

      <div>
        <span class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-2">Método de notificación</span>
        <div class="flex gap-4">
          <label class="inline-flex items-center gap-2 cursor-pointer">
            <input type="radio" formControlName="notificationMethod" value="email" class="rounded-full border-zinc-300 text-indigo-600 focus:ring-indigo-500" />
            <span class="text-sm text-zinc-700 dark:text-zinc-300">Email</span>
          </label>
          <label class="inline-flex items-center gap-2 cursor-pointer">
            <input type="radio" formControlName="notificationMethod" value="sms" class="rounded-full border-zinc-300 text-indigo-600 focus:ring-indigo-500" />
            <span class="text-sm text-zinc-700 dark:text-zinc-300">SMS</span>
          </label>
        </div>
      </div>

      <app-error-message [message]="errorMessage()" />

      <div class="flex gap-3 mt-6">
        <button
          type="button"
          (click)="close.emit()"
          class="flex-1 rounded-lg border border-zinc-300 dark:border-zinc-600 bg-white dark:bg-zinc-800 px-4 py-2 text-sm font-medium text-zinc-700 dark:text-zinc-300 hover:bg-zinc-50 dark:hover:bg-zinc-700"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="form.invalid || loading()"
          class="flex-1 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ loading() ? 'Procesando...' : 'Suscribir' }}
        </button>
      </div>
    </form>
  </div>
</div>
